name = "sub-store-cf"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

# KV 命名空间绑定
[[kv_namespaces]]
binding = "SUB_STORE_KV"
id = "YOUR_KV_NAMESPACE_ID"  # 需要替换为实际的 KV ID

# 环境变量
[env.production.vars]
SUB_STORE_API_TOKEN = "YOUR_SECURE_TOKEN_HERE"  # 强制修改

# 构建配置
[build]
command = "npm run build"

[build.upload]
format = "service-worker"
